<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Ramadan Journey 2026 🌙</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&family=Itim&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #f7f3f0;
            --post-it-color: #fffdf2;
            --post-it-success: #dfffe2;
            --post-it-missed: #ffe2e2;
            --text-color: #555;
            --line-color: rgba(0, 0, 0, 0.05);
            --primary-mint: #5d7e83;
            --prayer-green: #6cb177;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        .prayer-section {
            width: 100%; background: var(--prayer-green); color: white;
            padding: 12px; border-radius: 15px; margin: 10px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;
            box-sizing: border-box; transition: all 0.3s ease;
        }
        .prayer-toggle-btn {
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
            color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem;
            cursor: pointer; margin-top: 8px; font-family: 'Kanit';
        }
        .prayer-grid {
            display: none;
            grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px;
        }
        .prayer-grid.show { display: grid; }
        .prayer-item { font-size: 0.65rem; opacity: 0.8; padding: 5px; border-radius: 8px; line-height: 1.4; }
        .prayer-item.active { background: rgba(255,255,255,0.3); opacity: 1; font-weight: bold; }
        .next-prayer-info { font-size: 0.9rem; font-weight: 500; }

        .header-section {
            width: 90%; max-width: 450px; background: white; padding: 20px;
            border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center; margin-bottom: 20px; position: sticky; top: 10px; z-index: 10;
        }
        h1 { color: var(--primary-mint); margin: 0; font-size: 1.4rem; }
        .progress-container { width: 100%; background-color: #f0f0f0; border-radius: 10px; height: 14px; margin: 15px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #7fc384, #4caf50); transition: width 0.5s ease; }

        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px; width: 100%; max-width: 900px; padding-bottom: 40px;
        }
        .post-it {
            background: var(--post-it-color);
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 20px;
            aspect-ratio: 3 / 4; padding: 15px 10px;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.07); border-radius: 2px;
            cursor: pointer; font-family: 'Itim', cursive; transition: 0.3s; position: relative;
        }
        .post-it.success { background-color: var(--post-it-success); opacity: 0.8; transform: scale(0.95); }
        .post-it.missed { background-color: var(--post-it-missed); opacity: 0.8; transform: scale(0.95); }
        
        .day-name { font-size: 0.65rem; color: #999; margin-bottom: 2px; }
        .day-num { font-size: 1.6rem; font-weight: bold; color: #7da2a9; }
        .date-label { font-size: 0.75rem; color: #aaa; }
        .ibadah-icons { font-size: 0.7rem; margin-top: 10px; text-align: center; color: #666; }

        .flex-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .modal-btn { flex: 1; padding: 8px; border-radius: 10px; border: none; cursor: pointer; font-family: 'Kanit'; font-size: 0.7rem; }
        .btn-reset { background: transparent; border: 1px solid #eee; color: #ccc; width: 100%; margin-top: 8px; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; position: relative; }
        .close-btn { position: absolute; right: 15px; top: 10px; cursor: pointer; font-size: 1.5rem; color: #ccc; }
        .action-btn { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: none; font-family: 'Kanit'; cursor: pointer; font-weight: 500; }
        .btn-yes { background: #dfffe2; color: #2d5a27; }
        .btn-no { background: #ffe2e2; color: #a33a3a; }
        .extra-input-group { margin-top: 10px; text-align: left; padding: 12px; background: #f9f9f9; border-radius: 10px; font-size: 0.8rem; }
        input { width: 92%; padding: 8px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-family: 'Kanit'; }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>Ramadan 2026 🌙</h1>
        <h5 style="margin:5px 0; font-weight: 300;">By Winijnan</h5>
        
        <div class="progress-container"><div id="progress-bar"></div></div>
        
        <div style="font-size: 0.85rem; margin-bottom: 10px;">
            <span id="counter">สำเร็จ 0 วัน</span> | <span id="qada-text" style="color:#d9534f;">บวชชด: 0</span>
        </div>

        <div class="prayer-section">
            <div id="next-prayer-display" class="next-prayer-info">🕌 กำลังระบุตำแหน่ง...</div>
            <button class="prayer-toggle-btn" onclick="togglePrayerGrid()">ดูเวลาทั้งหมด ▼</button>
            <div class="prayer-grid" id="prayer-grid">
                <div class="prayer-item" id="p-Fajr">ซุบฮิ<br>--:--</div>
                <div class="prayer-item" id="p-Dhuhr">ซูฮรี<br>--:--</div>
                <div class="prayer-item" id="p-Asr">อัศริ<br>--:--</div>
                <div class="prayer-item" id="p-Maghrib">มัฆริบ<br>--:--</div>
                <div class="prayer-item" id="p-Isha">อิชาอ์<br>--:--</div>
            </div>
        </div>

        <div class="flex-buttons">
            <button class="modal-btn" style="background:#eee;" onclick="addExtraDay()">+ เพิ่มวัน (31)</button>
            <button id="btn-remove" class="modal-btn" style="background:#ffecec; color:#d9534f; display:none;" onclick="removeExtraDay()">- ลบวัน</button>
            <button class="modal-btn btn-reset" onclick="resetData()">รีเซ็ตทั้งหมด</button>
        </div>
    </div>

    <div class="grid-container" id="grid"></div>

    <div id="choiceModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle" style="margin-top:0; color: var(--primary-mint);">วันที่...</h3>
            <button class="action-btn btn-yes" onclick="showExtraInputs()">✅ ถือศีลอด</button>
            <div id="extraInputs" style="display:none;" class="extra-input-group">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="taraweehCheck" style="width: auto;"> ละหมาดตารอเวียะห์ 🕌
                </label>
                <label style="margin-top: 8px; display: block;">อ่านกุรอาน (หน้า)</label>
                <input type="number" id="quranPages" placeholder="0" min="0">
                <button class="action-btn" style="background:#4caf50; color:white; margin-top: 10px;" onclick="confirmFasting(true)">บันทึก</button>
            </div>
            <button class="action-btn btn-no" onclick="showReasonInput()">❌ ไม่ได้ถือศีลอด</button>
            <div id="reasonInput" style="display:none;" class="extra-input-group">
                <label>เหตุผลที่ไม่บวช</label>
                <input type="text" id="reasonText" placeholder="เช่น ประจำเดือน, ป่วย">
                <button class="action-btn" style="background:#d9534f; color:white;" onclick="confirmFasting(false)">บันทึก</button>
            </div>
        </div>
    </div>

    <script>
        const startDate = new Date('2026-02-18');
        let ramadanData = JSON.parse(localStorage.getItem('ramadanDataV6')) || [];
        const dayNames = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];
        let currentSelectingDay = null;

        function togglePrayerGrid() {
            const grid = document.getElementById('prayer-grid');
            const btn = document.querySelector('.prayer-toggle-btn');
            grid.classList.toggle('show');
            btn.innerText = grid.classList.contains('show') ? 'ปิดเวลาละหมาด ▲' : 'ดูเวลาทั้งหมด ▼';
        }

        // --- Prayer System with Auto-Location & Fallback ---
        async function fetchPrayerTimes(lat, lon, isFallback = false) {
            try {
                const response = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
                const data = await response.json();
                updatePrayerUI(data.data.timings);
                if(isFallback) {
                    document.getElementById('next-prayer-display').prepend("📍 กทม. | ");
                }
            } catch (e) { 
                document.getElementById('next-prayer-display').innerText = "โหลดข้อมูลไม่สำเร็จ"; 
            }
        }

        function getPrayerTimes() {
            // ดึงค่า กทม. มาแสดงเป็นพื้นฐานก่อนทันที (ไม่ต้องรอ)
            fetchPrayerTimes(13.7563, 100.5018, true);

            // พยายามขอตำแหน่งจริงของผู้ใช้
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => fetchPrayerTimes(pos.coords.latitude, pos.coords.longitude, false),
                    (err) => console.log("User denied location or error, using Bangkok as fallback.")
                );
            }
        }

        function updatePrayerUI(timings) {
            const prayers = [
                { id: 'Fajr', name: 'ซุบฮิ' },
                { id: 'Dhuhr', name: 'ซูฮรี' },
                { id: 'Asr', name: 'อัศริ' },
                { id: 'Maghrib', name: 'มัฆริบ' },
                { id: 'Isha', name: 'อิชาอ์' }
            ];
            const now = new Date();
            const currentTime = now.getHours() * 60 + now.getMinutes();
            let nextP = null;

            prayers.forEach(p => {
                const timeStr = timings[p.id];
                const el = document.getElementById(`p-${p.id}`);
                el.innerHTML = `${p.name}<br>${timeStr}`;
                el.classList.remove('active');
                const [h, m] = timeStr.split(':').map(Number);
                const pMin = h * 60 + m;
                if (pMin > currentTime && !nextP) {
                    nextP = p;
                    el.classList.add('active');
                }
            });

            const display = document.getElementById('next-prayer-display');
            if (!nextP) {
                document.getElementById('p-Fajr').classList.add('active');
                display.innerText = `ถัดไป: ซุบฮิ (พรุ่งนี้)`;
            } else {
                display.innerText = `ถัดไป: ${nextP.name} ${timings[nextP.id]}`;
            }
        }

        // --- ระบบรอมฎอนเดิม ---
        function init() {
            if (ramadanData.length === 0) {
                for(let i=1; i<=30; i++) ramadanData.push({ day: i, status: 'pending', reason: '', taraweeh: false, quran: 0 });
            }
            render();
            getPrayerTimes();
            setInterval(getPrayerTimes, 600000); // อัปเดตทุก 10 นาที
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            let qada = 0, done = 0;

            ramadanData.forEach(item => {
                const postIt = document.createElement('div');
                postIt.className = 'post-it ' + (item.status !== 'pending' ? item.status : '');
                const curDate = new Date(startDate);
                curDate.setDate(startDate.getDate() + (item.day - 1));
                
                let icons = '';
                if(item.status==='success') {
                    done++;
                    icons = `<div class="ibadah-icons">${item.taraweeh ? '🕌' : ''} ${item.quran > 0 ? '📖 '+item.quran : ''}</div>`;
                } else if(item.status==='missed') {
                    qada++;
                    icons = `<div style="font-size:0.6rem; color:#d9534f; margin-top:5px; font-weight: bold;">${item.reason}</div>`;
                }

                postIt.innerHTML = `
                    <div class="day-name">${dayNames[curDate.getDay()]}</div>
                    <div class="day-num">${item.day}</div>
                    <div class="date-label">${curDate.toLocaleDateString('th-TH',{day:'numeric',month:'short'})}</div>
                    ${icons}
                `;
                postIt.onclick = () => handlePostItClick(item, curDate);
                grid.appendChild(postIt);
            });

            const total = ramadanData.length;
            document.getElementById('progress-bar').style.width = ((done + qada) / total * 100) + '%';
            document.getElementById('counter').innerText = `สำเร็จ ${done} วัน`;
            document.getElementById('qada-text').innerText = `บวชชด: ${qada} วัน`;
            document.getElementById('btn-remove').style.display = total > 30 ? 'block' : 'none';
            localStorage.setItem('ramadanDataV6', JSON.stringify(ramadanData));
        }

        function handlePostItClick(item, date) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());

            if (target > today) {
                const dateStr = date.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
                return alert(`อดทนใจเย็นๆนะ ❤️\nยังไม่ถึงวันที่ ${item.day} (${dateStr})`);
            }
            
            if (item.status !== 'pending') {
                if(confirm(`ต้องการแก้ไขข้อมูลวันที่ ${item.day}?`)) {
                    item.status = 'pending';
                    render();
                }
                return;
            }
            
            currentSelectingDay = item.day;
            document.getElementById('modalTitle').innerText = `วันที่ ${item.day}`;
            document.getElementById('extraInputs').style.display = 'none';
            document.getElementById('reasonInput').style.display = 'none';
            document.getElementById('choiceModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('choiceModal').style.display = 'none'; }
        function showExtraInputs() { 
            document.getElementById('extraInputs').style.display='block'; 
            document.getElementById('reasonInput').style.display='none'; 
        }
        function showReasonInput() { 
            document.getElementById('reasonInput').style.display='block'; 
            document.getElementById('extraInputs').style.display='none'; 
        }

        function confirmFasting(isSuccess) {
            const item = ramadanData.find(d => d.day === currentSelectingDay);
            if (isSuccess) {
                item.status = 'success';
                item.taraweeh = document.getElementById('taraweehCheck').checked;
                item.quran = parseInt(document.getElementById('quranPages').value) || 0;
            } else {
                item.status = 'missed';
                item.reason = document.getElementById('reasonText').value || 'ไม่ได้บวช';
            }
            document.getElementById('taraweehCheck').checked = false;
            document.getElementById('quranPages').value = '';
            document.getElementById('reasonText').value = '';
            closeModal(); 
            render();
        }

        function addExtraDay() { 
            ramadanData.push({ day: ramadanData.length+1, status:'pending', reason:'', taraweeh:false, quran:0 }); 
            render(); 
        }
        function removeExtraDay() { if(ramadanData.length > 30) { ramadanData.pop(); render(); } }
        function resetData() { if(confirm("ล้างข้อมูลทั้งหมด?")) { localStorage.removeItem('ramadanDataV6'); location.reload(); } }

        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }
        init();
    </script>
</body>
</html>
